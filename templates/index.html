<div class="card">
    <div class="status-badge">Live Market Data</div>
    <h1>Bitcoin Global Price</h1>
    
    <div class="price-text" id="btc-price">{{ btc }}</div>
    
    <button onclick="refreshPrice()" id="refresh-btn" style="background:none; border:1px solid #10b981; color:#10b981; padding:5px 15px; border-radius:20px; cursor:pointer; font-size:0.8rem;">
        Update Price Only ↻
    </button>
</div>

<script>
function refreshPrice() {
    const btn = document.getElementById('refresh-btn');
    const priceText = document.getElementById('btc-price');
    
    btn.innerText = "Updating...";
    
    // طلب السعر الجديد من السيرفر بدون تحديث الصفحة
    fetch('/get_price')
        .then(response => response.json())
        .then(data => {
            priceText.innerText = data.price;
            btn.innerText = "Update Price Only ↻";
        })
        .catch(err => {
            btn.innerText = "Try Again";
        });
}
</script>
