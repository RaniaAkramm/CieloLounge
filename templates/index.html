<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <title>Paybass - أسعار الصرف والعملات</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="p-5 bg-gray-800 border-b border-gray-700 shadow-lg text-center">
        <h1 class="text-2xl font-bold tracking-widest text-blue-500">PAYBASS</h1>
    </nav>

    <main class="flex flex-col items-center justify-center mt-20 px-4">
        
        <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 w-full max-w-md text-center">
            <h2 class="text-gray-400 text-lg mb-2">سعر البيتكوين العالمي (BTC)</h2>
            
            <div class="text-5xl font-black text-green-400 my-4 tracking-tighter">
                {{ btc }}
            </div>

            <div class="flex justify-between items-center mt-8 p-4 bg-gray-900 rounded-2xl">
                <span class="text-gray-400">الحالة:</span>
                <span class="flex items-center text-green-500 text-sm">
                    <span class="w-2 h-2 bg-green-500 rounded-full ml-2 animate-pulse"></span>
                    مباشر الآن
                </span>
            </div>
        </div>

        <p class="mt-10 text-gray-500 text-sm">
            نعمل حالياً على إضافة أسعار الذهب والدولار في العراق.. انتظرونا!
        </p>
    </main>

</body>
</html>
