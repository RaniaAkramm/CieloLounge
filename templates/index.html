<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paybass | Global Currency Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card-bg: #0f172a; --accent: #f59e0b; --text: #f8fafc;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { margin: 40px 0; text-align: center; }
        .header h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 1.1rem; }

        .grid-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            width: 100%; max-width: 600px;
        }
        .currency-card {
            background: var(--card-bg); border: 1px solid #1e293b;
            border-radius: 20px; padding: 25px; text-align: center;
            cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; color: inherit;
        }
        .currency-card:hover {
            border-color: var(--accent); transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .currency-icon {
            font-size: 2rem; color: var(--accent); margin-bottom: 10px;
            display: block;
        }
        .currency-name { font-weight: 700; font-size: 1.2rem; }
        .currency-sub { font-size: 0.8rem; color: #64748b; margin-top: 5px; }

        .sale-footer {
            margin-top: 50px; padding: 20px; border-radius: 15px;
            border: 1px dashed #334155; width: 100%; max-width: 500px; text-align: center;
        }
        .btn-contact {
            background: var(--accent); color: #020617; padding: 12px 25px;
            border-radius: 10px; text-decoration: none; font-weight: 800;
            display: inline-block; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Paybass</h1>
        <p>World's Leading Currency Markets</p>
    </div>

    <div class="grid-container">
        <a href="/usd" class="currency-card">
            <span class="currency-icon">USD</span>
            <div class="currency-name">US Dollar</div>
            <div class="currency-sub">Global Reserve Currency</div>
        </a>

        <a href="/eur" class="currency-card">
            <span class="currency-icon">EUR</span>
            <div class="currency-name">Euro</div>
            <div class="currency-sub">European Union Markets</div>
        </a>

        <a href="/cny" class="currency-card">
            <span class="currency-icon">CNY</span>
            <div class="currency-name">Yuan</div>
            <div class="currency-sub">Asian Trading Power</div>
        </a>

        <a href="/gbp" class="currency-card">
            <span class="currency-icon">GBP</span>
            <div class="currency-name">Pound</div>
            <div class="currency-sub">British Financial Standard</div>
        </a>
    </div>

    <div class="sale-footer">
        <p style="color: #94a3b8; font-size: 0.9rem;">Paybass.com is available for acquisition</p>
        <a href="mailto:ssess535@gmail.com" class="btn-contact">INQUIRE NOW</a>
    </div>

</body>
</html>
